---
- name: Stop conflicting tftpd-hpa service
  ansible.builtin.systemd_service:
    name: tftpd-hpa
    enabled: false
    state: stopped
  failed_when: false

- name: Deploy dnsmasq PXE config
  ansible.builtin.template:
    src: dnsmasq-deploy-pxe.conf.j2
    dest: /etc/dnsmasq.d/deploy-pxe.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

- name: Ensure dnsmasq is enabled and started
  ansible.builtin.systemd_service:
    name: dnsmasq
    enabled: true
    state: started
