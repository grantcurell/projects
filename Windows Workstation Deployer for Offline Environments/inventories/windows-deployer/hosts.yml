all:
  children:
    local:
      hosts:
        localhost:
          ansible_connection: local
    proxmox_nodes:
      hosts:
        pve:
          ansible_host: 192.168.5.2
          ansible_user: root
          ansible_ssh_pass: "{{ vault_proxmox_root_password }}"
          ansible_ssh_common_args: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    # Offline Proxmox node that hosts the isolated vmbr27 network, the deployer,
    # the DC/admin fixtures, and the PXE test workstation. Used by the offline
    # test for pct restore / vzdump / pct exec operations local to that node.
    offline_proxmox_node:
      hosts:
        offline-pve:
          ansible_host: "{{ offline_test.proxmox_host }}"
          ansible_user: root
          ansible_ssh_pass: "{{ vault_proxmox_root_password }}"
          ansible_ssh_common_args: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    # The restored offline deployer LXC, reached by SSHing to the offline Proxmox
    # node and running `pct exec`. This is the jumpbox that runs every offline-net
    # probe (WinRM/LDAP/DHCP-lease) because the controller is not on vmbr27.
    offline_deployer:
      hosts:
        offline-deployer:
          ansible_host: "{{ offline_test.proxmox_host }}"
          ansible_user: root
          ansible_password: "{{ vault_proxmox_root_password }}"
          ansible_connection: community.proxmox.proxmox_pct_remote
          proxmox_vmid: "{{ offline_test.deployer.vmid }}"
    goldimage:
      hosts:
        goldimage_vm:
          ansible_host: 192.168.5.172
          ansible_user: Admin
          ansible_password: "{{ vault_goldimage_password }}"
          ansible_connection: winrm
          ansible_port: 5985
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
    winpe_builder:
      hosts:
        winserv2025:
          ansible_host: 192.168.5.171
          ansible_user: Administrator
          ansible_password: "{{ vault_winpe_builder_password }}"
          ansible_connection: winrm
          ansible_port: 5985
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
    deployer_lxc:
      hosts:
        win-deploy-lxc:
          ansible_host: 192.168.5.2
          ansible_user: root
          ansible_password: "{{ vault_proxmox_root_password }}"
          ansible_connection: community.proxmox.proxmox_pct_remote
          proxmox_vmid: 131
