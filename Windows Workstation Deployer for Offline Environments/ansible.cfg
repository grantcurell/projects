[defaults]
inventory = inventories/windows-deployer/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
callback_result_format = yaml
interpreter_python = auto_silent
remote_tmp = /tmp/.ansible/tmp
# Mandatory Ansible Vault: every secret is encrypted and auto-decrypted via the
# managed password file so the pipeline stays unattended (no --ask-vault-pass).
vault_password_file = .vault_pass
# error_on_undefined_vars is True by default and must never be disabled; this
# enforces the project no-defaults policy (no separate setting needed).

[ssh_connection]
pipelining = True
