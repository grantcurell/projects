---
- name: Validate Windows deployer inventory and network settings
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Assert required top-level sections exist
      ansible.builtin.assert:
        that:
          - proxmox is mapping
          - proxmox.defaults is mapping
          - windows is mapping
          - deployer is mapping
          - deployer.lxc is mapping
          - deployer.network is mapping
          - deployer.paths is mapping
          - deployer.artifacts is mapping
        fail_msg: "Missing required top-level inventory sections."

    - name: Assert required Proxmox variables
      ansible.builtin.assert:
        that:
          - proxmox.host is string
          - proxmox.host | length > 0
          - proxmox.user is string
          - proxmox.user | length > 0
          - proxmox.root_password is string
          - proxmox.root_password | length > 0
          - proxmox.node is string
          - proxmox.node | length > 0
          # Token fields are intentionally allowed to be blank at preflight time.
          # Token lifecycle is handled by Ansible runtime playbooks.
          - (proxmox.token | default('')) is string
          - (proxmox.automation_token_id | default('')) is string
          - proxmox.defaults.storage_pool is string
          - proxmox.defaults.storage_pool | length > 0
        fail_msg: "Proxmox variables are incomplete."

    - name: Assert WinPE builder variables
      ansible.builtin.assert:
        that:
          - windows.winpe_builder.ip is string
          - windows.winpe_builder.ip | length > 0
          - windows.winpe_builder.ip != "PUT_WINPE_BUILDER_IP_HERE"
          - windows.winpe_builder.username is string
          - windows.winpe_builder.username | length > 0
          - windows.winpe_builder.password is string
          - windows.winpe_builder.password | length > 0
          - windows.winpe_builder.password != "PUT_WINPE_BUILDER_PASSWORD_HERE"
        fail_msg: "windows.winpe_builder.ip, username, and password are required."

    - name: Assert goldimage variables
      ansible.builtin.assert:
        that:
          - windows.goldimage.vmid | int > 0
          - windows.goldimage.name is string
          - windows.goldimage.name | length > 0
          - windows.goldimage.ip is string
          - windows.goldimage.ip | length > 0
          - windows.goldimage.username is string
          - windows.goldimage.username | length > 0
          - windows.goldimage.password is string
          - windows.goldimage.password | length > 0
        fail_msg: "Goldimage variables are incomplete."

    - name: Assert deployer LXC variables required by imported role
      ansible.builtin.assert:
        that:
          - deployer.lxc.vmid | int > 0
          - deployer.lxc.hostname is string
          - deployer.lxc.hostname | length > 0
          - deployer.lxc.ip is string
          - deployer.lxc.ip | length > 0
          - deployer.lxc.cidr_prefix | int > 0
          - deployer.lxc.bridge is string
          - deployer.lxc.bridge | length > 0
          - deployer.lxc.hwaddr is string
          - deployer.lxc.hwaddr | length > 0
          - deployer.lxc.gateway is string
          - deployer.lxc.gateway | length > 0
          - deployer.lxc.memory_mb | int > 0
          - deployer.lxc.swap_mb | int >= 0
          - deployer.lxc.rootfs_gb | int > 0
        fail_msg: "Deployer LXC variables are incomplete for create_lxc_container."

    - name: Assert DHCP and DNS settings are exactly approved
      ansible.builtin.assert:
        that:
          - deployer.network.server_ip is string
          - deployer.network.server_ip | length > 0
          - deployer.network.subnet_cidr is string
          - deployer.network.subnet_cidr | length > 0
          - deployer.network.netmask is string
          - deployer.network.netmask | length > 0
          - deployer.network.dhcp_start is string
          - deployer.network.dhcp_start | length > 0
          - deployer.network.dhcp_end is string
          - deployer.network.dhcp_end | length > 0
          - deployer.network.dns_server is string
          - deployer.network.dns_server | length > 0
        fail_msg: "Network settings must be explicitly declared in inventory."

    - name: Assert offline appliance identity is explicitly defined (no defaults)
      ansible.builtin.assert:
        that:
          - deployer.offline is mapping
          - deployer.offline.hostname is string
          - deployer.offline.hostname | length > 0
          - deployer.offline.hostname_fqdn is string
          - deployer.offline.hostname_fqdn | length > 0
        fail_msg: "deployer.offline.hostname and deployer.offline.hostname_fqdn must be set in inventory."

    - name: Assert WinPE wimboot args key is defined (empty allowed, but must exist)
      ansible.builtin.assert:
        that:
          - windows.deploy_debug is mapping
          - windows.deploy_debug.wimboot_args is defined
        fail_msg: "windows.deploy_debug.wimboot_args must be defined in inventory (empty string allowed)."

    - name: Assert site domain schema is present and well-formed (no defaults)
      ansible.builtin.assert:
        that:
          - deployer.site is mapping
          - deployer.site.domain is mapping
          - deployer.site.domain.enabled is boolean
          - deployer.site.naming is mapping
          - deployer.site.naming.source is string
          - deployer.site.naming.source | length > 0
          - deployer.site.naming.max_length | int > 0
        fail_msg: "deployer.site.domain.enabled and deployer.site.naming.* must be explicitly defined in inventory."

    - name: Assert site DNS servers are provided when domain join is enabled
      ansible.builtin.assert:
        that:
          - deployer.site.domain.dns_servers is iterable
          - deployer.site.domain.dns_servers | length > 0
          - deployer.site.domain.domain_fqdn | length > 0
        fail_msg: "When deployer.site.domain.enabled is true, dns_servers and domain_fqdn are required."
      when: deployer.site.domain.enabled | bool

    - name: Assert all vault-backed credentials decrypt and are non-empty (no defaults)
      ansible.builtin.assert:
        that:
          - vault_proxmox_root_password is defined
          - vault_proxmox_root_password | length > 0
          - vault_goldimage_password is defined
          - vault_goldimage_password | length > 0
          - vault_winpe_builder_password is defined
          - vault_winpe_builder_password | length > 0
          - vault_deployer_lxc_password is defined
          - vault_deployer_lxc_password | length > 0
          - vault_deploy_smb_password is defined
          - vault_deploy_smb_password | length > 0
          - vault_workstation_local_admin_password is defined
          - vault_workstation_local_admin_password | length > 0
        fail_msg: >-
          One or more vault_* credentials are missing. Ensure group_vars/all/vault.yml exists,
          is ansible-vault encrypted, and that .vault_pass can decrypt it (run scripts/environment-wizard.py).
      no_log: true

    - name: Assert offline-test schema is present and well-formed (no defaults)
      ansible.builtin.assert:
        that:
          - offline_test is mapping
          - offline_test.enabled is boolean
          - offline_test.bridge | length > 0
          - offline_test.subnet_cidr | length > 0
          - offline_test.proxmox_node | length > 0
          - offline_test.proxmox_host | length > 0
          - offline_test.deployer.vmid | int > 0
          - offline_test.deployer.ip | length > 0
          - offline_test.deployer.cidr_prefix | int > 0
          - offline_test.deployer.gateway | length > 0
          - offline_test.deployer.storage | length > 0
          - offline_test.domain_controller.vmid | int > 0
          - offline_test.domain_controller.ip | length > 0
          - offline_test.domain_controller.winrm_user | length > 0
          - offline_test.admin_workstation.vmid | int > 0
          - offline_test.domain.fqdn | length > 0
          - offline_test.domain.netbios | length > 0
          - offline_test.domain.ou | length > 0
          - offline_test.domain.dns_servers | length > 0
          - offline_test.join_account.username | length > 0
          - offline_test.test_workstation.vmid | int > 0
          - offline_test.test_workstation.smbios_serial | length > 0
          - offline_test.test_workstation.node | length > 0
          - offline_test.test_workstation.storage | length > 0
          - offline_test.test_workstation.bios | length > 0
          - offline_test.test_workstation.boot_order | length > 0
          - offline_test.test_workstation.post_deploy_boot_order | length > 0
        fail_msg: "offline_test.* must be fully and explicitly defined in inventory."
      when: offline_test.enabled | bool

    - name: Assert offline-test vault credentials decrypt and are non-empty (no defaults)
      ansible.builtin.assert:
        that:
          - vault_offline_dc_winrm_password is defined
          - vault_offline_dc_winrm_password | length > 0
          - vault_offline_admin_winrm_password is defined
          - vault_offline_admin_winrm_password | length > 0
          - vault_offline_domain_join_password is defined
          - vault_offline_domain_join_password | length > 0
        fail_msg: >-
          Offline-test vault_* credentials are missing. Add vault_offline_dc_winrm_password,
          vault_offline_admin_winrm_password, and vault_offline_domain_join_password to
          group_vars/all/vault.yml (run scripts/environment-wizard.py) or set offline_test.enabled: false.
      no_log: true
      when: offline_test.enabled | bool

    - name: Ensure artifact directory exists
      ansible.builtin.file:
        path: "{{ deployer.artifacts.local_dir }}"
        state: directory
        mode: "0755"
