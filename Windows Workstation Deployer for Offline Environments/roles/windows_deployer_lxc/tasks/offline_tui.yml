---
- name: Install offline TUI OS packages on the deployer
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-yaml
      - python3-dnspython
      # AD binds use Kerberos (SASL/GSSAPI) via python-ldap. A default-hardened
      # AD DC requires LDAP signing and frequently has no LDAPS certificate, so
      # SIMPLE/NTLM over plain LDAP is refused. python-ldap + the MIT GSSAPI
      # cyrus-sasl plugin negotiates a signed channel; python-gssapi lets us mint
      # the TGT straight from the join credential (no kinit/ccache needed).
      - python3-ldap
      - python3-gssapi
      - libsasl2-modules-gssapi-mit
      - ansible-core
    state: present
    update_cache: true

# textual is not packaged in apt. Install it into a dedicated venv that also
# exposes the apt-provided modules (yaml/ldap/gssapi/dnspython) via system site
# packages. This avoids clobbering the distro-managed Pygments/Rich packages.
- name: Create offline TUI virtualenv
  ansible.builtin.command:
    argv:
      - python3
      - -m
      - venv
      - --system-site-packages
      - "{{ deployer.offline_tui.venv }}"
    creates: "{{ deployer.offline_tui.venv }}/bin/python"

- name: Install offline TUI Python deps not packaged in apt
  ansible.builtin.pip:
    name:
      - textual
      # pywinrm is baked into the deployer image here (while the build host is
      # still online) because the deployer runs every offline-net WinRM probe
      # for the automated domain-join test and the offline site has no internet.
      - pywinrm
    state: present
    virtualenv: "{{ deployer.offline_tui.venv }}"

- name: Create offline TUI install directory
  ansible.builtin.file:
    path: "{{ deployer.offline_tui.install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create offline TUI config directory (holds non-secret config + vault files)
  ansible.builtin.file:
    path: "{{ deployer.offline_tui.local_config | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install offline TUI application + helpers
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/{{ item }}"
    dest: "{{ deployer.offline_tui.install_dir }}/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - offline-deployer-tui.py
    - ad_discovery.py
    - offline_configure.py
    - offline_verify.py

- name: Install offline-setup wrapper
  ansible.builtin.template:
    src: offline-setup.j2
    dest: "{{ deployer.offline_tui.entrypoint }}"
    owner: root
    group: root
    mode: "0755"

- name: Seed non-secret offline config if absent
  ansible.builtin.copy:
    dest: "{{ deployer.offline_tui.local_config }}"
    owner: root
    group: root
    mode: "0640"
    force: false
    content: |
      # Non-secret offline deployer settings (managed by offline-setup).
      # Secrets live ONLY in {{ deployer.offline_tui.vault.secrets_file }} (ansible-vault encrypted).
      offline_hostname: {{ deployer.offline.hostname }}
      offline_hostname_fqdn: {{ deployer.offline.hostname_fqdn }}
      site_path: {{ deployer.paths.site }}
      join_secret_path: {{ deployer.paths.join_secret }}
      vault_password_file: {{ deployer.offline_tui.vault.password_file }}
      vault_secrets_file: {{ deployer.offline_tui.vault.secrets_file }}
